name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: railway-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Login to Railway
        run: railway login --token "${{ secrets.RAILWAY_TOKEN }}"

      - name: Deploy to Railway
        run: |
          railway up --detach \
            --project "${{ secrets.RAILWAY_PROJECT_ID }}" \
            --environment "${{ secrets.RAILWAY_ENVIRONMENT_ID }}" \
            --service "${{ secrets.RAILWAY_SERVICE_ID }}"

      - name: Verify deployment
        run: |
          echo "التحقق من النشر..."
          for i in $(seq 1 12); do
            sleep 10
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://frameid.up.railway.app/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ تم نشر الخدمة بنجاح (HTTP $STATUS)"
              exit 0
            fi
            echo "محاولة $i/12: HTTP $STATUS - إعادة المحاولة..."
          done
          echo "فشل التحقق من نشر الخدمة بعد 12 محاولة"
          exit 1