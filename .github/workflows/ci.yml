name: FrameID CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: frameid-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://frameid:frameid@127.0.0.1:5432/frameid
      NEXT_PUBLIC_APP_URL: https://frameid.example.com
      SESSION_SECRET: ci-session-secret-with-more-than-32-characters
      ADMIN_SESSION_SECRET: ci-admin-session-secret-with-more-than-32-characters
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test upload pipeline
        run: npx vitest run tests/media-upload-service.test.ts tests/platform-image-upload.test.ts

      - name: Test full suite
        id: full_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test 2>&1 | tee test-results.log

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-test-diagnostics
          path: test-results.log
          if-no-files-found: error
          retention-days: 1

      - name: Stop after test failure
        if: steps.full_tests.outcome != 'success'
        run: exit 1

      - name: Build
        run: npm run build
