name: FrameID Backup Trigger
on:
  schedule:
    - cron: "0 */12 * * *"
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      type:
        description: "نوع النسخة"
        required: true
        default: DATABASE
        type: choice
        options: [DATABASE, FULL]
concurrency:
  group: frameid-backup-trigger-${{ github.event.inputs.type || github.event.schedule }}
  cancel-in-progress: false
permissions:
  contents: read
  id-token: write
jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: تحديد نوع النسخة
        id: backup-type
        run: |
          SCHEDULE_CRON="${{ github.event.schedule }}"
          INPUT_TYPE="${{ github.event.inputs.type }}"
          if [ -n "$INPUT_TYPE" ]; then
            echo "type=$INPUT_TYPE" >> $GITHUB_OUTPUT
          elif echo "$SCHEDULE_CRON" | grep -q "0 3 "; then
            echo "type=FULL" >> $GITHUB_OUTPUT
          else
            echo "type=DATABASE" >> $GITHUB_OUTPUT
          fi

      - name: تشغيل FrameID Backup Pipeline
        env:
          FRAMEID_BACKUP_URL: https://frameid.up.railway.app
          REQUESTED_TYPE: ${{ steps.backup-type.outputs.type }}
          BACKUP_MODE: ${{ github.event_name == 'schedule' && 'SCHEDULED' || 'FORCED' }}
        run: |
          OIDC_TOKEN="$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=frameid-backup" | jq -r '.value')"
          curl --fail-with-body --silent --show-error --request POST \
            --header "Authorization: Bearer ${OIDC_TOKEN}" \
            --header "Content-Type: application/json" \
            --header "X-FrameID-Backup-Trigger: GITHUB_ACTIONS" \
            --header "X-FrameID-Backup-Mode: ${BACKUP_MODE}" \
            --data "{\"type\":\"${REQUESTED_TYPE}\"}" \
            "${FRAMEID_BACKUP_URL%/}/api/backups/run"
