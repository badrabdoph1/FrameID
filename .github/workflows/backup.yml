name: FrameID Backup Trigger
on:
  schedule:
    - cron: "0 */12 * * *"
    - cron: "0 3 */2 * *"
  workflow_dispatch:
    inputs:
      type:
        description: "نوع النسخة"
        required: true
        default: DATABASE
        type: choice
        options: [DATABASE, FULL]
concurrency:
  group: frameid-backup-trigger-${{ github.event.inputs.type || github.event.schedule }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: تشغيل FrameID Backup Pipeline
        env:
          FRAMEID_BACKUP_URL: ${{ secrets.FRAMEID_BACKUP_URL }}
          FRAMEID_BACKUP_TRIGGER_SECRET: ${{ secrets.FRAMEID_BACKUP_TRIGGER_SECRET }}
          REQUESTED_TYPE: ${{ github.event.inputs.type || (github.event.schedule == '0 3 */2 * *' && 'FULL') || 'DATABASE' }}
        run: >-
          curl --fail-with-body --silent --show-error --request POST
          --header "Authorization: Bearer ${FRAMEID_BACKUP_TRIGGER_SECRET}"
          --header "Content-Type: application/json"
          --header "X-FrameID-Backup-Trigger: GITHUB_ACTIONS"
          --data "{\"type\":\"${REQUESTED_TYPE}\"}"
          "${FRAMEID_BACKUP_URL%/}/api/backups/run"
