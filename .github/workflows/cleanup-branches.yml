name: One-time branch cleanup

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-branches.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete every branch except main
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api --paginate "repos/${GITHUB_REPOSITORY}/git/matching-refs/heads/" --jq '.[].ref' \
            | sed 's#^refs/heads/##' \
            | while IFS= read -r branch; do
                if [ "$branch" != "main" ]; then
                  echo "Deleting branch: $branch"
                  encoded_branch=$(printf '%s' "$branch" | sed 's#/#%2F#g')
                  gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${encoded_branch}"
                fi
              done
