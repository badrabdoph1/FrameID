services:
  postgres:
    image: postgres:16-alpine
    container_name: frameid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: frameid
      POSTGRES_PASSWORD: frameid
      POSTGRES_DB: frameid
    ports:
      - "5432:5432"
    volumes:
      - frameid-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frameid -d frameid"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  frameid-postgres-data:
